version: '3.8'

services:
  app:
    build: .
    container_name: staff-health-app
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgres://hruser:hrpassword@db:5432/hr_db
      - NODE_ENV=production
      - PORT=5001
      # تم إضافة كلمة سر قوية وثابتة للجلسات لمنع أخطاء 401
      - SESSION_SECRET=SH_Secure_2026_Admin_Auth_Key_Fixed 
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: staff-health-db
    environment:
      - POSTGRES_USER=hruser
      - POSTGRES_PASSWORD=hrpassword
      - POSTGRES_DB=hr_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hruser -d hr_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
